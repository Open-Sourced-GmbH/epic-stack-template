<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epic Stack UI — Handoff</title>
<link rel="stylesheet" href="../styles.css">
<style>
  :root { color-scheme: light; }
  html.dark { color-scheme: dark; }
  /* Brand accent (repo ADR 062): --primary + --ring follow --brand (Pine), mode-
     independent. The compiled bundle here predates this — declare it so the live
     components and swatches match the updated source. */
  :root, html.dark {
    --brand: oklch(60% 0.135 172);
    --brand-soft: color-mix(in srgb, var(--brand) 13%, transparent);
    --brand-glow: oklch(from var(--brand) l c h / 0.32);
    --primary: var(--brand);
    --primary-foreground: oklch(98.38% 0.0035 247.86);
    --ring: var(--brand);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--background);
    color: var(--foreground);
    font-family: var(--font-sans, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 32px 160px; }

  /* ── top bar ── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: color-mix(in oklch, var(--background) 88%, transparent);
    backdrop-filter: saturate(1.4) blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .topbar-inner { max-width: 1080px; margin: 0 auto; padding: 14px 32px; display: flex; align-items: center; gap: 16px; }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand b { font-weight: 650; letter-spacing: -0.01em; }
  .brand .ver { font-family: var(--font-mono, ui-monospace, monospace); font-size: 12px; color: var(--muted-foreground); }
  .spacer { flex: 1; }
  .navlinks { display: flex; gap: 4px; }
  .navlinks a {
    color: var(--muted-foreground); text-decoration: none; font-size: 13px;
    padding: 6px 10px; border-radius: var(--radius); white-space: nowrap;
  }
  .navlinks a:hover { color: var(--foreground); background: var(--accent); }
  .mode-toggle {
    display: inline-flex; align-items: center; gap: 7px; cursor: pointer;
    border: 1px solid var(--border); background: var(--card); color: var(--foreground);
    border-radius: var(--radius); padding: 6px 12px; font-size: 13px; font-family: inherit;
  }
  .mode-toggle:hover { background: var(--accent); }

  /* ── hero ── */
  .hero { padding: 72px 0 40px; border-bottom: 1px solid var(--border); }
  .eyebrow { font-family: var(--font-mono, monospace); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted-foreground); margin: 0 0 18px; }
  h1 { font-size: clamp(34px, 5vw, 52px); line-height: 1.04; letter-spacing: -0.025em; font-weight: 680; margin: 0 0 20px; max-width: 16ch; }
  .lede { font-size: 19px; line-height: 1.55; color: var(--muted-foreground); max-width: 62ch; margin: 0; }
  .stats { display: flex; flex-wrap: wrap; gap: 40px; margin-top: 44px; }
  .stat .n { font-size: 30px; font-weight: 650; letter-spacing: -0.02em; }
  .stat .l { font-size: 13px; color: var(--muted-foreground); margin-top: 2px; }

  /* ── section ── */
  section { padding-top: 64px; scroll-margin-top: 80px; }
  .sec-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .sec-no { font-family: var(--font-mono, monospace); font-size: 13px; color: var(--muted-foreground); }
  h2 { font-size: 26px; letter-spacing: -0.02em; font-weight: 640; margin: 0; }
  .sec-sub { color: var(--muted-foreground); font-size: 15px; margin: 8px 0 28px; max-width: 70ch; }

  .card {
    background: var(--card); color: var(--card-foreground);
    border: 1px solid var(--border); border-radius: calc(var(--radius) + 4px);
    padding: 24px;
  }
  .grid { display: grid; gap: 16px; }

  /* swatches */
  .sw-grid { grid-template-columns: repeat(auto-fill, minmax(168px, 1fr)); }
  .sw { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--card); }
  .sw-chip { height: 56px; border-bottom: 1px solid var(--border); display: flex; }
  .sw-chip > div { flex: 1; }
  .sw-meta { padding: 9px 11px; }
  .sw-name { font-family: var(--font-mono, monospace); font-size: 12px; font-weight: 600; }
  .sw-role { font-size: 11.5px; color: var(--muted-foreground); margin-top: 1px; }

  /* matrix table */
  .tbl-scroll { overflow-x: auto; border: 1px solid var(--border); border-radius: calc(var(--radius) + 2px); }
  table { border-collapse: collapse; width: 100%; font-size: 13.5px; }
  th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted-foreground); font-weight: 600; background: var(--muted); position: sticky; top: 0; }
  tbody tr:last-child td { border-bottom: none; }
  td.compname { font-family: var(--font-mono, monospace); font-weight: 600; white-space: nowrap; }
  td.api { color: var(--muted-foreground); white-space: nowrap; font-size: 12.5px; }
  td.gaps { color: var(--foreground); min-width: 260px; }
  .dot { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 6px; font-size: 12px; font-weight: 700; }
  .d-y { background: color-mix(in oklch, var(--foreground) 9%, transparent); color: var(--foreground); }
  .d-n { background: color-mix(in oklch, var(--destructive) 16%, transparent); color: var(--destructive); }
  .d-p { background: color-mix(in oklch, var(--ring) 24%, transparent); color: var(--foreground); }
  .d-na { color: var(--muted-foreground); opacity: 0.5; }
  .statecol { text-align: center; }

  /* live demo cells */
  .demos { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
  .demo .demo-h { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .demo .demo-h b { font-family: var(--font-mono, monospace); font-size: 13px; }
  .demo .demo-body { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; min-height: 52px; }

  /* proposals */
  .props { gap: 12px; }
  .prop { display: grid; grid-template-columns: 56px 1fr; gap: 16px; align-items: start; padding: 18px; border: 1px solid var(--border); border-radius: calc(var(--radius) + 2px); background: var(--card); }
  .pri { font-family: var(--font-mono, monospace); font-size: 12px; font-weight: 700; padding: 3px 0; text-align: center; border-radius: 6px; }
  .pri-0 { background: var(--destructive); color: var(--destructive-foreground); }
  .pri-1 { background: var(--secondary); color: var(--secondary-foreground); }
  .pri-2 { background: var(--muted); color: var(--muted-foreground); }
  .prop h4 { margin: 1px 0 6px; font-size: 16px; letter-spacing: -0.01em; }
  .prop p { margin: 0; font-size: 13.5px; color: var(--muted-foreground); line-height: 1.5; }
  .prop .tok { margin-top: 9px; font-family: var(--font-mono, monospace); font-size: 11.5px; color: var(--muted-foreground); }
  .prop .tok span { color: var(--foreground); }

  /* callout */
  .callout { display: flex; gap: 14px; padding: 18px 20px; border-radius: calc(var(--radius) + 2px); border: 1px solid var(--border); background: var(--muted); font-size: 14px; }
  .callout .bar { width: 3px; border-radius: 3px; background: var(--foreground); flex: none; }
  .callout b { font-weight: 640; }
  .callout code { font-family: var(--font-mono, monospace); font-size: 12.5px; background: color-mix(in oklch, var(--foreground) 8%, transparent); padding: 1px 5px; border-radius: 4px; }

  /* reference screens */
  .screens { grid-template-columns: repeat(auto-fit, minmax(330px, 1fr)); align-items: start; }
  .screen .screen-cap { font-family: var(--font-mono, monospace); font-size: 12px; color: var(--muted-foreground); margin-bottom: 10px; }
  .field { display: grid; gap: 6px; }
  .field .err { color: var(--foreground-destructive); font-size: 12.5px; }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--card); }
  .row + .row { margin-top: 8px; }
  .row .who { display: flex; align-items: center; gap: 11px; }
  .avatar { width: 34px; height: 34px; border-radius: 999px; background: var(--secondary); color: var(--secondary-foreground); display: grid; place-items: center; font-size: 13px; font-weight: 600; flex: none; }
  .row .nm { font-size: 14px; font-weight: 550; }
  .row .em { font-size: 12px; color: var(--muted-foreground); }
  .savebar { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px; border: 1px solid var(--border); border-radius: calc(var(--radius) + 2px); background: var(--card); }
  .empty { text-align: center; padding: 36px 20px; border: 1px dashed var(--border); border-radius: calc(var(--radius) + 2px); }
  .empty .ic { width: 44px; height: 44px; border-radius: 12px; background: var(--muted); margin: 0 auto 14px; display: grid; place-items: center; }
  .empty .t { font-weight: 600; font-size: 15px; }
  .empty .s { color: var(--muted-foreground); font-size: 13px; margin: 6px 0 16px; }
  .skel { height: 12px; border-radius: 6px; background: var(--muted); position: relative; overflow: hidden; }
  .skel::after { content: ""; position: absolute; inset: 0; transform: translateX(-100%); background: linear-gradient(90deg, transparent, color-mix(in oklch, var(--foreground) 6%, transparent), transparent); animation: sh 1.4s infinite; }
  @keyframes sh { 100% { transform: translateX(100%); } }
  @media (prefers-reduced-motion: reduce) { .skel::after { animation: none; } }

  .badge { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 999px; font-size: 11.5px; font-weight: 600; }
  .badge-ok { background: color-mix(in oklch, var(--ring) 26%, transparent); color: var(--foreground); }
  .badge-muted { background: var(--secondary); color: var(--secondary-foreground); }

  .typescale > div { display: flex; align-items: baseline; gap: 18px; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .typescale > div:last-child { border-bottom: none; }
  .typescale .tn { font-family: var(--font-mono, monospace); font-size: 12px; color: var(--muted-foreground); width: 130px; flex: none; }
  .footnote { color: var(--muted-foreground); font-size: 13px; margin-top: 14px; }
  a.inline { color: var(--foreground); text-underline-offset: 3px; }

  /* ── Cosy focus: one refined, unified focus treatment ──────────────────────
     Replaces the stock detached 2px offset ring with a 1px brand border that
     hugs the control plus a gentle --brand-glow halo, eased in on focus and back
     out on blur. Standardized across inputs, textareas, buttons, checkboxes and
     OTP slots so every control feels smooth and cosy. */
  input, textarea, button, [class*="ring-"] {
    transition: box-shadow .2s cubic-bezier(.32,.72,0,1),
                border-color .2s cubic-bezier(.32,.72,0,1),
                background-color .2s ease, color .15s ease;
  }
  input:focus, textarea:focus, button:focus,
  .ring-ring.ring-2 {                 /* all controls show on focus (click or keyboard); .ring-ring.ring-2 = active OTP slot */
    outline: none !important;
    --tw-ring-shadow: 0 0 #0000 !important;
    --tw-ring-offset-shadow: 0 0 #0000 !important;
    box-shadow: 0 0 0 2px oklch(from var(--brand) l c h / 0.2) !important;
    border-color: var(--brand) !important;
  }
  @media (prefers-reduced-motion: reduce) {
    input, textarea, button, [class*="ring-"] { transition: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<script src="data.js"></script>
<script type="text/babel" src="app.jsx"></script>
<script src="ripple.js"></script>
</body>
</html>
