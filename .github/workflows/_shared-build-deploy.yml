name: Reusable Build & Deploy Workflow

on:
  workflow_call:
    inputs:
      deploy_environment:
        description: 'Deployment environment (staging or production)'
        required: true
        type: string
      cloudron_app_location:
        description: 'Cloudron app location'
        required: true
        type: string
      docker_image_tag:
        description: 'Docker image tag'
        required: true
        type: string
      manifest_title:
        description: 'CloudronManifest.json title'
        required: true
        type: string
      manifest_memory_limit:
        description: 'CloudronManifest.json memoryLimit'
        required: true
        type: string
      git_ref:
        description: 'Git ref to checkout and build'
        required: true
        type: string
      tag_as_latest:
        description: "Whether to tag image as 'latest'"
        required: false
        type: boolean
        default: false
    secrets:
      CLOUDRON_SERVER:
        required: true
      CLOUDRON_TOKEN:
        required: true

# DOCKER_IMAGE_BASENAME is derived from the repository at runtime (lowercased,
# as GHCR requires) by the "Derive image basename" step below - no per-fork edit.
env:
  DOCKER_REGISTRY: ghcr.io

jobs:
  build_and_deploy:
    name: Build & Deploy (${{ inputs.deploy_environment }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Derive image basename
        run: echo "DOCKER_IMAGE_BASENAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Checkout code at specific ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0

      - name: Validate package.json and CloudronManifest.json version match
        run: |
          PROJECT_VERSION=$(node -p "require('./package.json').version")
          CLOUDRON_MANIFEST_VERSION=$(node -p "require('./CloudronManifest.json').version")

          if [[ "$PROJECT_VERSION" != "$CLOUDRON_MANIFEST_VERSION" ]]; then
            echo "::error file=package.json,line=1::Version mismatch! package.json ($PROJECT_VERSION) vs CloudronManifest.json ($CLOUDRON_MANIFEST_VERSION)."
            exit 1
          fi
          echo "Version validated: $PROJECT_VERSION"

      - name: Update CloudronManifest.json for environment
        run: |
          echo "Updating CloudronManifest.json for ${{ inputs.deploy_environment }} environment..."
          echo "Setting Title to: ${{ inputs.manifest_title }}"
          echo "Setting MemoryLimit to: ${{ inputs.manifest_memory_limit }}"
          jq --arg title "${{ inputs.manifest_title }}" \
             --argjson mem ${{ inputs.manifest_memory_limit }} \
             '.title = $title | .memoryLimit = $mem' \
             CloudronManifest.json > tmp.$$.json && mv tmp.$$.json CloudronManifest.json
          echo "CloudronManifest.json updated:"
          cat CloudronManifest.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags:
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_BASENAME }}:${{
            inputs.docker_image_tag }}

      - name: Tag and Push as 'latest'
        if: inputs.tag_as_latest
        run: |
          echo "Tagging image as 'latest' in ${{ env.DOCKER_REGISTRY }}"
          docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_BASENAME }}:${{ inputs.docker_image_tag }}
          docker tag ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_BASENAME }}:${{ inputs.docker_image_tag }} ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_BASENAME }}:latest
          docker push ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_BASENAME }}:latest
          echo "Tagged and pushed '${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_BASENAME }}:latest'"

      - name: Install Cloudron CLI
        run: npm install -g cloudron

      - name: Deploy to Cloudron
        run: |
          FULL_IMAGE_NAME="${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_BASENAME }}:${{ inputs.docker_image_tag }}"
          echo "Deploying to Cloudron app ${{ inputs.cloudron_app_location }} with image ${FULL_IMAGE_NAME}"
          cloudron \
            --server ${{ secrets.CLOUDRON_SERVER }} \
            --token ${{ secrets.CLOUDRON_TOKEN }} \
            update \
            --app ${{ inputs.cloudron_app_location }} \
            --image "${FULL_IMAGE_NAME}"
          echo "Cloudron deployment completed successfully."
